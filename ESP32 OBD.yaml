esphome:
  name: $device_internal_name
  friendly_name: $friendly_name
  comment: EPS32-S3 N16R8
  # https://github.com/shpegun60/ESP32-S3-N16R8/blob/85d3ecc973858c9ff781ffd413dd6f892be4114c/ESP32-S3-DevKitC-1-N16R8.json
  platformio_options:
  #   board_build.arduino.memory_type: qio_opi
  #   board_build.flash_mode: qio
    build_flags: 
      -DARDUINO_USB_MODE=0
      -DARDUINO_USB_CDC_ON_BOOT=0
      -DCONFIG_IDF_TARGET_ESP32S3

logger:
  level: DEBUG
  logs:
    ble_elm327: DEBUG
    ble_elm327.sensor: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 0s

ota:
  platform: esphome

wifi:
  reboot_timeout: 0s
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # ---------------------------------
  # ESP32S3N16R8 config 20250106 serial, RGBW LEDs and working PSRAM

substitutions:
  friendly_name: "car-obd"
  device_internal_name: car-obd
  logger_lvl: "DEBUG"

web_server:
  version: 3

esp32:
  board: esp32-s3-devkitc1-n16r8
  variant: esp32s3
  cpu_frequency: 240MHz
  flash_size: 16MB
  # partitions: "partitions_custom.csv" # partition works
  framework:
    type: esp-idf
    version: recommended
# https://community.home-assistant.io/t/ i-cant-get-the-psram-of-an-esp32-s3-n16r8-to-work/948815/8
    sdkconfig_options:
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: "y"

psram:
  mode: octal
  speed: 80MHz

# https://github.com/eigger/espcomponents/tree/master/components/ble_elm327
# ------------------------------------------------
# esp32_ble_tracker:
#   scan_parameters:
#     active: true

# text_sensor:
#   - platform: ble_scanner
#     name: "BLE Devices Scanner" 
# ------------------------------------------------
external_components:
  - source: github://eigger/espcomponents@latest
    components: [ ble_elm327 ]
    refresh: always

ble_client:
  - mac_address: "66:1E:87:00:B3:4F"
    id: obd_client

# http://forum.gps-laptimer.de/viewtopic.php?p=25972#p25972
# OBD error codes - https://www.programmersought.com/article/5475147562/
ble_elm327:
  id: elm
  ble_client_id: obd_client
  # uuid values are unique to VEEPEAK OBD-II Scan Tool
  service_uuid: "FFF0"
  rx_char_uuid: "FFF1"
  tx_char_uuid: "FFF2"
  init_commands:
    - "ATAL"
    # - "ATSP6"
    # - "ATS0"
    # - "ATM0"
    # - "ATAT1"
  tx_delay: 50

  # sleeping current of 12mA
switch:
  - platform: ble_client
    ble_client_id: obd_client
    name: "Enable OBDII"

# one hex character = 4 bits
# https://www.home-assistant.io/integrations/sensor/#device-class
# PID codes - https://obdb.community/#/vehicles/Hyundai/IONIQ-5
# to calculate byte index, divide first bit position by 8, this is the byte index.

#            0  1  2
# 0:62 01 01 EF FB E7

#   3  4  5  6  7  8  9
# 1:EF 9A 20 40 01 72 00

#   10 11 12 13 14 15 16
# 2:FF F3 1D BB 1E 1D 1D

#   17 18 19 20 21 22 23
# 3:1E 1D 1D 1D 00 46 C6

#   24 25 26 27 28 29 30
# 4:BC C6 9C 00 00 7E 00

#   31 32 33 34 35 36 37
# 5:02 88 E6 00 02 84 CD

# 6:00 01 E1 C3 00 01 D6
# 7:E6 03 75 D0 8D 00 02
# 8:F7 00 00 00 00 06 68
# https://www.home-assistant.io/integrations/binary_sensor/#device-class
binary_sensor:
  - platform: template
    name: "HV Battery"
    lambda: |-
      return id(hv_battery_charging).state > 0.0f;
    device_class: battery_charging

  - platform: template
    name: "Charging Socket"
    lambda: |-
      return id(charging_socket_connected).state > 0.0f;
    device_class: connectivity
      
sensor:
  # 0:62B002D00000
  # 1:00FF9B00000000
  # 2:7A95AAAAAAAAAA #7A95 is mileage
  - platform: ble_elm327
    name: "Odometer"
    pid: "B002"
    mode: "22"
    pre_commands:
      - "ATSH 7C6"
    update_interval: 60s
    formula: "return (x[9] * 0x10000 + x[10] * 0x100 + x[11]);"
    device_class: distance
    unit_of_measurement: mi
    accuracy_decimals: 0

    # when charging [9] = 0111 0010
  - platform: ble_elm327
    # name: "HV Battery Charging - raw"
    id: hv_battery_charging
    pid: "0101"
    mode: "22"
    pre_commands:
      - "ATSH 7E4"
    update_interval: 60s
    formula: "return x[8];" # BIT POSITION 72

    # 5 - connected (stays at 5 when not charging)    0101
    # 4 - not connected or charging                   0100
    # 0 - not connected, not charging                 0000
  - platform: ble_elm327
    # name: "Charging Socket Connected - raw"
    id: charging_socket_connected
    pid: "E004"
    mode: "22"
    pre_commands:
      - "ATSH 744"
    update_interval: 60s
    formula: "return x[4] & 0x01;" # BIT POSITION 38, 2's place
    
    # new capacity is 77.4kWh
    # this may be calculated from 70kWh
    # https://www.reddit.com/r/Ioniq5/comments/1uy5k56/comment/oxwil5x/?utm_source=share&utm_medium=web3x&utm_name=web3xcss&utm_term=1&utm_content=share_button
  - platform: ble_elm327
    name: "Remaining Energy"
    pid: "0105"
    mode: "22"
    pre_commands:
      - "ATSH 7E4"
    update_interval: 60s
    formula: "return (x[28] * 256.0f + x[29]) * 2.0f / 1000.0f;"
    device_class: energy
    unit_of_measurement: kWh
    accuracy_decimals: 2
    filters:
      - clamp:
          max_value: 77.4
          ignore_out_of_range: true
      
  - platform: ble_elm327
    name: "HV Battery State of Charge"
    pid: "0105"
    mode: "22"
    pre_commands:
      - "ATSH 7E4"
    update_interval: 60s
    # formula: "return x[4] / 2.0f;"
    formula: "return x[31] / 2.0f;"
    device_class: battery
    unit_of_measurement: "%"
    accuracy_decimals: 1
    filters:
      - clamp:
          min_value: 1.0
          ignore_out_of_range: true

  - platform: ble_elm327
    name: "Charger Voltage"
    id: "charger_voltage"
    pid: "E002"
    mode: "22"
    pre_commands:
      - "ATSH 7E5"
    update_interval: 60s
    formula: "return (e * 256.0f + f) / 10.0f;"
    device_class: voltage
    unit_of_measurement: V
    accuracy_decimals: 1

  - platform: ble_elm327
    name: "Charger Current"
    id: "charger_current"
    pid: "E002"
    mode: "22"
    pre_commands:
      - "ATSH 7E5"
    update_interval: 60s
    formula: "return (x[11] * 256.0f + x[12]) / 100.0f;"
    device_class: current
    unit_of_measurement: A
    accuracy_decimals: 2
    filters:
      - clamp:
          max_value: 48
          ignore_out_of_range: true
    on_value:
      then:
      - component.update: charger_power

  - platform: template
    name: "Charger Power"
    id: "charger_power"
    lambda: |-
      return ( id(charger_voltage).state * id(charger_current).state ) / 1000.0f;
    device_class: power
    unit_of_measurement: kW
    accuracy_decimals: 1

  - platform: ble_elm327
    name: "12V Battery State of Charge"
    pid: "E011"
    mode: "22"
    pre_commands:
      - "ATSH 7E5"
    update_interval: 60s
    formula: "return x[20];"
    device_class: battery
    unit_of_measurement: "%"
    accuracy_decimals: 0
    filters:
      - clamp:
          min_value: 1.0
          ignore_out_of_range: true

  - platform: ble_elm327
    name: "12V Battery Voltage"
    pid: "E001"
    mode: "22"
    pre_commands:
      - "ATSH 744"
    update_interval: 60s
    formula: "return (x[11] * 256.0f + x[12]) / 100.0f;"
    device_class: voltage
    unit_of_measurement: V
    accuracy_decimals: 1
    filters:
      - clamp:
          max_value: 20.0
          ignore_out_of_range: true
